<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>계산서</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Apple SD Gothic Neo',sans-serif;background:#f5f5f0;color:#222;min-height:100vh;}

/* 탭 */
.tabs{display:flex;background:#fff;border-bottom:2px solid #e0e0d8;position:sticky;top:0;z-index:100;}
.tab{flex:1;padding:14px 0;text-align:center;font-size:14px;font-weight:600;color:#aaa;cursor:pointer;transition:.2s;}
.tab.on{color:#2d7a0e;border-bottom:2px solid #2d7a0e;margin-bottom:-2px;}

/* 화면 */
.screen{display:none;padding:16px;}
.screen.on{display:block;}

/* 플래시 */
#flash{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;opacity:0;transition:.3s;pointer-events:none;z-index:999;white-space:nowrap;}

/* 카드 */
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.card-title{font-size:13px;color:#aaa;font-weight:600;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;}

/* 입력 */
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;color:#888;margin-bottom:4px;font-weight:600;}
.field input{width:100%;border:1.5px solid #e0e0d8;border-radius:8px;padding:10px 12px;font-size:15px;outline:none;transition:.2s;background:#fafaf8;}
.field input:focus{border-color:#2d7a0e;background:#fff;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* 품목 줄 */
.item-row{display:grid;grid-template-columns:1fr 80px 36px;gap:6px;align-items:center;margin-bottom:8px;}
.item-row input{border:1.5px solid #e0e0d8;border-radius:8px;padding:9px 8px;font-size:14px;outline:none;background:#fafaf8;width:100%;}
.item-row input:focus{border-color:#2d7a0e;background:#fff;}
.del-btn{background:none;border:none;font-size:18px;cursor:pointer;color:#ccc;padding:4px;}

/* 버튼 */
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:.15s;}
.btn-green{background:#2d7a0e;color:#fff;}
.btn-green:active{background:#236009;}
.btn-outline{background:#fff;color:#2d7a0e;border:2px solid #2d7a0e;margin-top:8px;}
.btn-add{background:#f0f7ec;color:#2d7a0e;border:none;border-radius:8px;padding:10px;width:100%;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:12px;}

/* 합계 */
.total-box{background:#f0f7ec;border-radius:10px;padding:14px;margin-bottom:14px;text-align:right;}
.total-box span{font-size:13px;color:#666;}
.total-box strong{font-size:22px;color:#2d7a0e;font-weight:800;display:block;margin-top:2px;}

/* 목록 */
.doc-item{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.doc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.doc-biz{font-size:17px;font-weight:800;color:#222;}
.doc-date{font-size:12px;color:#aaa;}
.doc-items{font-size:13px;color:#555;line-height:1.8;margin-bottom:10px;}
.doc-total{font-size:15px;font-weight:700;color:#2d7a0e;margin-bottom:10px;}
.doc-btns{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;}
.doc-btn{padding:8px 0;border:1.5px solid #e0e0d8;border-radius:8px;background:#fff;font-size:13px;cursor:pointer;font-weight:600;color:#555;}
.doc-btn.share{color:#2d7a0e;border-color:#b8dba8;}
.doc-btn.del{color:#c05a00;border-color:#f0d0b8;}

.empty{text-align:center;color:#bbb;padding:40px 0;font-size:15px;}
</style>
</head>
<body>

<div id="flash"></div>

<div class="tabs">
  <div class="tab on" onclick="goTab(0,this)">✏️ 작성</div>
  <div class="tab" onclick="goTab(1,this)">📋 목록</div>
</div>

<!-- 작성 화면 -->
<div class="screen on" id="s0">
  <div class="card">
    <div class="card-title">기본 정보</div>
    <div class="field"><label>거래처명</label><input id="biz" placeholder="거래처 이름" type="text"></div>
    <div class="row2">
      <div class="field"><label>날짜</label><input id="date" type="date"></div>
      <div class="field"><label>메모</label><input id="memo" placeholder="선택" type="text"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">품목</div>
    <div style="display:grid;grid-template-columns:1fr 80px 36px;gap:6px;margin-bottom:6px;">
      <span style="font-size:12px;color:#aaa;padding-left:4px;">품목명</span>
      <span style="font-size:12px;color:#aaa;text-align:center;">수량</span>
      <span></span>
    </div>
    <div id="items"></div>
    <button class="btn-add" onclick="addRow()">+ 품목 추가</button>
    <button class="btn btn-green" onclick="saveDoc()">💾 저장</button>
    <button class="btn btn-outline" onclick="clearForm()">🔄 초기화</button>
  </div>
</div>

<!-- 목록 화면 -->
<div class="screen" id="s1">
  <div id="list"></div>
</div>

<script>
var docs = JSON.parse(localStorage.getItem('bills')||'[]');
var editId = null;

// 오늘 날짜
document.getElementById('date').value = new Date().toISOString().slice(0,10);

// 탭
function goTab(i,el){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('on');});
  el.classList.add('on');
  document.getElementById('s'+i).classList.add('on');
  if(i===1) renderList();
}

// 플래시
function flash(msg){
  var el=document.getElementById('flash');
  el.textContent=msg;el.style.opacity='1';
  setTimeout(function(){el.style.opacity='0';},2000);
}

// 행 추가
function addRow(nm,qty){
  var d=document.getElementById('items');
  var r=document.createElement('div');
  r.className='item-row';
  r.innerHTML='<input placeholder="품목명" value="'+(nm||'')+'">'+
    '<input placeholder="수량" type="number" value="'+(qty||'')+'">'+
    '<button class="del-btn" onclick="this.parentNode.remove()">✕</button>';
  d.appendChild(r);
}

function fmt(n){return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,',');}

// 저장
function saveDoc(){
  var biz=document.getElementById('biz').value.trim();
  var date=document.getElementById('date').value;
  var memo=document.getElementById('memo').value.trim();
  if(!biz){flash('거래처명을 입력하세요');return;}
  if(!date){flash('날짜를 입력하세요');return;}
  var rows=document.querySelectorAll('#items .item-row');
  var items=[];
  rows.forEach(function(r){
    var ins=r.querySelectorAll('input');
    var nm=ins[0].value.trim();
    var qty=ins[1].value||'';
    if(nm) items.push({nm:nm,qty:qty});
  });
  if(!items.length){flash('품목을 하나 이상 입력하세요');return;}
  var totalQty=items.reduce(function(s,i){return s+(parseInt(i.qty)||0);},0);

  if(editId!==null){
    var idx=docs.findIndex(function(d){return d.id===editId;});
    if(idx>-1) docs[idx]={id:editId,biz:biz,date:date,memo:memo,items:items,totalQty:totalQty};
    editId=null;
  } else {
    docs.push({id:Date.now(),biz:biz,date:date,memo:memo,items:items,totalQty:totalQty});
  }
  localStorage.setItem('bills',JSON.stringify(docs));
  flash('✅ 저장됨');
  clearForm();
}

// 초기화
function clearForm(){
  editId=null;
  document.getElementById('biz').value='';
  document.getElementById('memo').value='';
  document.getElementById('date').value=new Date().toISOString().slice(0,10);
  document.getElementById('items').innerHTML='';
  addRow();
}

// 목록
function renderList(){
  var el=document.getElementById('list');
  if(!docs.length){el.innerHTML='<div class="empty">저장된 계산서가 없습니다</div>';return;}
  var sorted=[].concat(docs).sort(function(a,b){return b.date.localeCompare(a.date);});
  var h='';
  sorted.forEach(function(d){
    var itemsTxt=d.items.map(function(i){return i.nm+(i.qty?' '+i.qty+'개':'');}).join('<br>');
    var tq=d.totalQty||d.items.reduce(function(s,i){return s+(parseInt(i.qty)||0);},0);
    h+='<div class="doc-item">';
    h+='<div class="doc-header"><span class="doc-biz">'+esc(d.biz)+'</span><span class="doc-date">'+d.date+(d.memo?' · '+esc(d.memo):'')+'</span></div>';
    h+='<div class="doc-items">'+itemsTxt+'</div>';
    h+='<div class="doc-btns">'+
      '<button class="doc-btn" onclick="editDoc('+d.id+')">✏️ 수정</button>'+
      '<button class="doc-btn share" onclick="shareDoc('+d.id+')">📤 공유</button>'+
      '<button class="doc-btn" onclick="printDoc('+d.id+')">🖨️ 출력</button>'+
      '<button class="doc-btn del" onclick="delDoc('+d.id+')">🗑️ 삭제</button>'+
    '</div></div>';
  });
  el.innerHTML=h;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// 수정
function editDoc(id){
  var d=docs.find(function(x){return x.id===id;});
  if(!d)return;
  editId=id;
  document.getElementById('biz').value=d.biz;
  document.getElementById('date').value=d.date;
  document.getElementById('memo').value=d.memo||'';
  document.getElementById('items').innerHTML='';
  d.items.forEach(function(i){addRow(i.nm,i.qty);});
  goTab(0,document.querySelectorAll('.tab')[0]);
}

// 공유
function shareDoc(id){
  var d=docs.find(function(x){return x.id===id;});
  if(!d)return;
  var tq=d.totalQty||d.items.reduce(function(s,i){return s+(parseInt(i.qty)||0);},0);

  var txt='';
  txt+='거래명세서\n';
  txt+='──────────\n';
  txt+=d.biz+'\n';
  txt+=d.date+(d.memo?'  '+d.memo:'')+'\n';
  txt+='──────────\n';
  d.items.forEach(function(i){
    var nm=i.nm;
    var qty=i.qty?i.qty+'개':'';
    // 품목명과 수량 사이 점선으로 채우기
    var line=nm+'  '+qty;
    txt+=line+'\n';
  });
  txt+='──────────\n';
  txt+='합계  '+tq+'개\n';

  if(navigator.share){
    navigator.share({title:'거래명세서 · '+d.biz, text:txt}).catch(function(){});
  } else {
    if(navigator.clipboard){
      navigator.clipboard.writeText(txt).then(function(){flash('📋 복사됨');});
    } else {
      var ta=document.createElement('textarea');
      ta.value=txt;document.body.appendChild(ta);ta.select();
      document.execCommand('copy');document.body.removeChild(ta);
      flash('📋 복사됨');
    }
  }
}

// 출력
function printDoc(id){
  var d=docs.find(function(x){return x.id===id;});
  if(!d)return;
  var rows=d.items.map(function(i,n){
    return '<tr><td>'+(n+1)+'</td><td>'+esc(i.nm)+'</td><td style="text-align:center">'+(i.qty||'-')+'</td></tr>';
  }).join('');
  var tq=d.totalQty||d.items.reduce(function(s,i){return s+(parseInt(i.qty)||0);},0);
  var w=window.open('','_blank');
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>계산서</title><style>'+
    'body{font-family:sans-serif;padding:30px;max-width:600px;margin:0 auto;}'+
    'h2{margin-bottom:4px;}'+
    '.info{color:#555;font-size:14px;margin-bottom:20px;}'+
    'table{width:100%;border-collapse:collapse;margin-bottom:20px;}'+
    'th,td{border:1px solid #ddd;padding:8px 10px;font-size:14px;}'+
    'th{background:#f5f5f0;font-weight:700;}'+
    '.total{text-align:right;font-size:18px;font-weight:800;color:#2d7a0e;}'+
    '</style></head><body>'+
    '<h2>계산서</h2>'+
    '<div class="info">거래처: <b>'+esc(d.biz)+'</b> &nbsp;|&nbsp; 날짜: '+d.date+(d.memo?' &nbsp;|&nbsp; '+esc(d.memo):'')+'</div>'+
    '<table><tr><th>#</th><th>품목명</th><th>수량</th></tr>'+rows+'</table>'+
    '<div class="total">합계: '+tq+'</div>'+
    '<script>window.print();<\/script>'+
    '</body></html>');
  w.document.close();
}

// 삭제
function delDoc(id){
  if(!confirm('삭제할까요?'))return;
  docs=docs.filter(function(d){return d.id!==id;});
  localStorage.setItem('bills',JSON.stringify(docs));
  renderList();
}

// 초기 행 추가
addRow();
</script>
</body>
</html>
