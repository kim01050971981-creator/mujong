<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>계산서</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Malgun Gothic',sans-serif;background:#f7f7f5;min-height:100vh}
.hd{background:#1a1a1a;padding:18px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.hd-t{color:#fff;font-size:20px;font-weight:700}
.hd-s{color:#aaa;font-size:12px;margin-top:2px}
.wrap{padding:14px}
.card{background:#fff;border-radius:14px;padding:18px;margin-bottom:12px;border:1px solid #e8e8e4}
.lbl{font-size:12px;color:#888;font-weight:600;margin-bottom:6px;margin-top:14px}
.lbl:first-child{margin-top:0}
input{width:100%;padding:13px 15px;border:1px solid #e0e0dc;border-radius:10px;font-size:16px;background:#fafaf8;color:#1a1a1a;outline:none;font-weight:500}
input:focus{border-color:#1a1a1a;background:#fff}
input::placeholder{color:#ccc;font-weight:400}
.row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.row .nm{flex:2}
.row .qty{flex:1;text-align:right}
.row .del{width:40px;height:48px;border:none;background:#f0f0ec;border-radius:10px;font-size:20px;cursor:pointer;flex-shrink:0}
.add-btn{width:100%;padding:13px;border:1px dashed #ccc;border-radius:10px;background:#fafaf8;color:#888;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:14px}
.btn{width:100%;padding:14px;border:none;border-radius:11px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px}
.btn-k{background:#1a1a1a;color:#fff}
.btn-gray{background:#f0f0ec;color:#888}
.tabs{display:flex;gap:4px;margin-bottom:16px}
.tab{flex:1;padding:10px;border:1px solid #e0e0dc;border-radius:20px;background:#fff;color:#888;font-size:14px;cursor:pointer;font-weight:500;text-align:center}
.tab.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-weight:700}
.pane{display:none}.pane.on{display:block}
.msg{background:#f4f9f0;border:1px solid #c8e8a0;border-radius:10px;padding:11px 16px;font-size:14px;color:#2d7a0e;margin-bottom:12px;text-align:center;font-weight:600;display:none}
.doc{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:14px;border:1px solid #e8e8e4}
.doc-hd{background:#1a1a1a;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
.doc-hd-l{color:#fff;font-size:16px;font-weight:700}
.doc-hd-r{color:#aaa;font-size:14px}
.doc-row{display:flex;justify-content:space-between;padding:13px 18px;border-bottom:1px solid #f7f7f5;font-size:16px}
.doc-row span:first-child{font-weight:600;color:#1a1a1a}
.doc-row span:last-child{font-weight:700;color:#1a1a1a}
.doc-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:10px 12px;background:#fafaf8;border-top:1px solid #e8e8e4}
.doc-btn{padding:9px;border:1px solid #e0e0dc;border-radius:9px;background:#fff;font-size:13px;font-weight:600;cursor:pointer;text-align:center}
.empty{text-align:center;padding:50px 20px;color:#ccc;font-size:16px}
</style>
</head>
<body>
<div class="hd">
  <div><div class="hd-t">🧾 계산서</div><div class="hd-s" id="sub">자동저장</div></div>
</div>
<div class="wrap">
  <div class="msg" id="msg"></div>
  <div class="tabs">
    <button class="tab on" onclick="goTab('write',this)">✏️ 작성</button>
    <button class="tab" onclick="goTab('list',this)">📋 목록</button>
  </div>

  <div id="pane-write" class="pane on">
    <div class="card">
      <div class="lbl">날짜</div>
      <input type="date" id="idate">
      <div class="lbl">거래처</div>
      <input type="text" id="ibiz" placeholder="거래처 이름 (선택)">
      <div class="lbl">품목 · 숫자</div>
      <div id="rows">
        <div class="row">
          <input class="nm" type="text" placeholder="품목명">
          <input class="qty" type="text" placeholder="숫자">
          <button class="del" onclick="delRow(this)">×</button>
        </div>
      </div>
      <button class="add-btn" onclick="addRow()">+ 품목 추가</button>
      <button class="btn btn-k" id="sbtn" onclick="savDoc()">💾 저장</button>
      <button class="btn btn-gray" id="scbtn" style="display:none" onclick="reset()">취소</button>
    </div>
  </div>

  <div id="pane-list" class="pane"></div>
</div>

<script>
var docs=[],eid=null,KEY='bill-v1';
function flash(m){var el=document.getElementById('msg');el.textContent=m;el.style.display='block';setTimeout(function(){el.style.display='none';},2500);}
function load(){try{var v=localStorage.getItem(KEY);if(v){var d=JSON.parse(v);if(d&&d.length){docs=d;flash('✅ '+d.length+'건 불러왔습니다');}}}catch(e){}renderList();}
function sv(){try{localStorage.setItem(KEY,JSON.stringify(docs));var s=document.getElementById('sub');s.textContent='저장됨';setTimeout(function(){s.textContent='자동저장';},2000);}catch(e){}}
function addRow(){
  var d=document.createElement('div');d.className='row';
  d.innerHTML='<input class="nm" type="text" placeholder="품목명"><input class="qty" type="text" placeholder="숫자"><button class="del" onclick="delRow(this)">×</button>';
  document.getElementById('rows').appendChild(d);
}
function delRow(btn){var rows=document.querySelectorAll('#rows .row');if(rows.length>1)btn.parentNode.remove();}
function getRows(){
  var items=[];
  document.querySelectorAll('#rows .row').forEach(function(r){
    var nm=r.querySelector('.nm').value.trim();
    var qty=r.querySelector('.qty').value.trim();
    if(nm||qty)items.push({nm:nm,qty:qty});
  });
  return items;
}
function savDoc(){
  var date=document.getElementById('idate').value;
  var biz=document.getElementById('ibiz').value.trim();
  var items=getRows();
  if(!date||!items.length)return;
  var doc={date:date,biz:biz,items:items,id:eid||Date.now()};
  if(eid)docs=docs.map(function(d){return d.id===eid?doc:d;});else docs.push(doc);
  eid=null;sv();reset();goTab('list',document.querySelectorAll('.tab')[1]);
}
function reset(){
  document.getElementById('idate').value='';
  document.getElementById('ibiz').value='';
  document.getElementById('rows').innerHTML='<div class="row"><input class="nm" type="text" placeholder="품목명"><input class="qty" type="text" placeholder="숫자"><button class="del" onclick="delRow(this)">×</button></div>';
  document.getElementById('sbtn').textContent='💾 저장';
  document.getElementById('scbtn').style.display='none';
  eid=null;
}
function delDoc(id){docs=docs.filter(function(d){return d.id!==id;});sv();renderList();}
function editDoc(id){
  var d=docs.find(function(d){return d.id===id;});if(!d)return;
  document.getElementById('idate').value=d.date;
  document.getElementById('ibiz').value=d.biz||'';
  var cont=document.getElementById('rows');cont.innerHTML='';
  d.items.forEach(function(item){
    var r=document.createElement('div');r.className='row';
    r.innerHTML='<input class="nm" type="text" placeholder="품목명" value="'+item.nm+'"><input class="qty" type="text" placeholder="숫자" value="'+item.qty+'"><button class="del" onclick="delRow(this)">×</button>';
    cont.appendChild(r);
  });
  eid=id;
  document.getElementById('sbtn').textContent='✅ 수정 완료';
  document.getElementById('scbtn').style.display='block';
  goTab('write',document.querySelectorAll('.tab')[0]);window.scrollTo(0,0);
}
function printDoc(id){
  var d=docs.find(function(d){return d.id===id;});if(!d)return;
  var rows=d.items.map(function(i){return '<tr><td style="padding:12px 0;border-bottom:1px solid #eee;font-size:17px">'+i.nm+'</td><td style="padding:12px 0;border-bottom:1px solid #eee;text-align:right;font-size:17px;font-weight:700">'+i.qty+'</td></tr>';}).join('');
  var w=window.open('','_blank');
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>계산서</title><style>body{font-family:sans-serif;padding:30px;max-width:420px;margin:0 auto}table{width:100%;border-collapse:collapse}button{margin-top:16px;width:100%;padding:14px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}@media print{button{display:none}}</style></head><body>');
  w.document.write('<h2 style="margin-bottom:6px">🧾 계산서</h2>');
  w.document.write('<p style="color:#888;margin-bottom:20px;font-size:15px">'+d.date+(d.biz?' &nbsp;|&nbsp; '+d.biz:'')+'</p>');
  w.document.write('<table><thead><tr><th style="text-align:left;padding:10px 0;border-bottom:2px solid #1a1a1a;font-size:14px;color:#888">품목</th><th style="text-align:right;padding:10px 0;border-bottom:2px solid #1a1a1a;font-size:14px;color:#888">수량</th></tr></thead><tbody>'+rows+'</tbody></table>');
  w.document.write('<button onclick="window.print()">🖨️ 인쇄</button>');
  w.document.write('</body></html>');
  w.document.close();
}
function goTab(t,btn){
  document.querySelectorAll('.pane').forEach(function(p){p.classList.remove('on');});
  document.getElementById('pane-'+t).classList.add('on');
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  if(t==='list')renderList();
}
function renderList(){
  var c=document.getElementById('pane-list');
  if(!docs.length){c.innerHTML='<div class="empty">작성 탭에서 계산서를 만들어주세요</div>';return;}
  var s=docs.slice().sort(function(a,b){return b.date.localeCompare(a.date);});
  var h='';
  s.forEach(function(d){
    var pt=d.date.split('-');
    h+='<div class="doc"><div class="doc-hd"><span class="doc-hd-l">'+pt[0]+'.'+pt[1]+'.'+pt[2]+(d.biz?' · '+d.biz:'')+'</span><span class="doc-hd-r">'+d.items.length+'품목</span></div>';
    d.items.forEach(function(i){h+='<div class="doc-row"><span>'+i.nm+'</span><span>'+i.qty+'</span></div>';});
    h+='<div class="doc-btns"><button class="doc-btn" onclick="editDoc('+d.id+')">✏️ 수정</button><button class="doc-btn" onclick="printDoc('+d.id+')">🖨️ 출력</button><button class="doc-btn" style="color:#c05a00" onclick="delDoc('+d.id+')">🗑️ 삭제</button></div></div>';
  });
  c.innerHTML=h;
}
load();
</script>
</body>
</html>
