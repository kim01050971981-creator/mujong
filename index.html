<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>토지보상 PRO v2.0</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header><h1>토지보상 PRO v2.0</h1><p>모바일 물건조사 · 조서 · 집계 · 백업</p></header>

<main>
<section id="home" class="page active">
<div class="card">
<h2>대시보드</h2>
<div class="grid">
<div><span>총 물건</span><b id="countAll">0</b></div>
<div><span>소유자</span><b id="countOwner">0</b></div>
<div><span>필지</span><b id="countParcel">0</b></div>
<div><span>합계</span><b id="sumAll">0원</b></div>
</div>
<div id="typeBadges"></div>
</div>
<div class="card">
<button onclick="newItem()">물건 등록</button>
<button class="green" onclick="go('treePage')">수목 전용</button>
<button class="orange" onclick="go('cropPage')">농작물 전용</button>
<button class="gray" onclick="go('machinePage')">농기계 전용</button>
</div>
</section>

<section id="itemPage" class="page">
<div class="card">
<h2>물건 등록</h2>
<input id="editIndex" type="hidden">
<label>물건번호</label><input id="no">
<label>조사일</label><input id="date" type="date">
<label>소유자</label><input id="owner">
<label>연락처</label><input id="phone">
<label>필지/지번</label><input id="parcel">
<label>구분</label><select id="type"><option>지장물</option><option>수목</option><option>농작물</option><option>농기계</option><option>기타</option></select>
<label>명칭</label><input id="name">
<label>규격</label><input id="spec">
<label>수량</label><input id="qty" type="number" value="1">
<label>단위</label><select id="unit"><option>개</option><option>주</option><option>㎡</option><option>평</option><option>대</option><option>식</option><option>m</option><option>동</option></select>
<label>단가</label><input id="price" type="number" value="0">
<label>상태</label><select id="status"><option>조사완료</option><option>조사전</option><option>보완필요</option><option>검토완료</option></select>
<label>GPS</label><input id="gps" readonly><button class="green" onclick="getGps()">GPS 저장</button>
<label>사진</label><input type="file" accept="image/*" capture="environment" onchange="previewPhoto(this)">
<img id="photoPreview" class="preview">
<label>메모</label><textarea id="memo"></textarea>
<button onclick="saveItem()">저장</button>
</div>
</section>

<section id="treePage" class="page"><div class="card">
<h2>수목 전용</h2>
<label>소유자</label><input id="tOwner"><label>필지</label><input id="tParcel"><label>수종</label><input id="tName">
<label>수량</label><input id="tQty" type="number" value="1">
<label>H(m)</label><input id="tH" type="number" step="0.1" value="2">
<label>R(cm)</label><input id="tR" type="number" step="0.1" value="5">
<label>W(m)</label><input id="tW" type="number" step="0.1" value="1">
<label>수령</label><input id="tAge" type="number" value="5">
<label>수형</label><select id="tShape"><option>상</option><option>중</option><option>하</option></select>
<button onclick="saveTree()">수목 저장</button>
</div></section>

<section id="cropPage" class="page"><div class="card">
<h2>농작물 전용</h2>
<label>소유자</label><input id="cOwner"><label>필지</label><input id="cParcel">
<label>작물명</label><input id="cName">
<label>면적</label><input id="cArea" type="number" value="0">
<label>단위</label><select id="cUnit"><option>평</option><option>㎡</option></select>
<label>재배상태</label><select id="cStatus"><option>양호</option><option>보통</option><option>불량</option></select>
<label>수확가능</label><select id="cHarvest"><option>가능</option><option>불가</option><option>일부가능</option></select>
<button onclick="saveCrop()">농작물 저장</button>
</div></section>

<section id="machinePage" class="page"><div class="card">
<h2>농기계 이전비</h2>
<label>소유자</label><input id="mOwner"><label>필지</label><input id="mParcel">
<label>기계명</label><select id="mName"><option>관리기</option><option>경운기</option><option>트랙터</option><option>콤바인</option><option>분무기</option><option>기타</option></select>
<label>수량</label><input id="mQty" type="number" value="1">
<label>이전거리(km)</label><input id="mKm" type="number" value="10">
<label>난이도</label><select id="mLevel"><option>보통</option><option>쉬움</option><option>어려움</option></select>
<button onclick="saveMachine()">농기계 저장</button>
</div></section>

<section id="listPage" class="page"><div class="card">
<h2>목록</h2>
<input id="search" oninput="render()" placeholder="검색">
<table id="list"><tr><th>번호</th><th>소유자</th><th>구분</th><th>금액</th><th>작업</th></tr></table>
</div></section>

<section id="sheetPage" class="page printPage"><div class="card">
<h2>조서 출력</h2>
<label>소유자</label><select id="ownerFilter" onchange="makeSheets()"></select>
<button onclick="makeSheets()">조서 생성</button>
<button onclick="window.print()">PDF 저장/인쇄</button>
<div id="sheets"></div>
</div></section>

<section id="exportPage" class="page"><div class="card">
<h2>내보내기/백업</h2>
<button onclick="makeOwnerSummary()">소유자별 총괄</button>
<button onclick="makeParcelSummary()">필지별 총괄</button>
<button onclick="exportCsv()">CSV</button>
<button onclick="exportJson()">JSON</button>
<button class="red" onclick="clearAll()">전체 초기화</button>
<textarea id="out"></textarea>
</div></section>
</main>

<nav>
<button onclick="go('home')">홈</button>
<button onclick="go('itemPage')">등록</button>
<button onclick="go('listPage')">목록</button>
<button onclick="go('sheetPage')">조서</button>
<button onclick="go('exportPage')">백업</button>
</nav>
<script src="js/app.js"></script>
</body>
</html>
