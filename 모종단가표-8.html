<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>모종 단가표</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Malgun Gothic',sans-serif;background:#f7f7f5;min-height:100vh;color:#1a1a1a}
.hd{background:#fff;padding:18px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;border-bottom:1px solid #e8e8e4}
.hd-t{font-size:20px;font-weight:700}.hd-s{font-size:12px;color:#aaa;margin-top:2px}
.hd-r p{font-size:12px;color:#aaa;text-align:right}
.hd-r strong{font-size:22px;font-weight:700;color:#2d7a0e;display:block;text-align:right}
.wrap{padding:14px}
.tabs{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px}
.tab{flex-shrink:0;padding:9px 14px;border:1px solid #e0e0dc;border-radius:20px;background:#fff;color:#888;font-size:13px;cursor:pointer;font-weight:500;white-space:nowrap}
.tab.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-weight:600}
.card{background:#fff;border-radius:14px;padding:18px;margin-bottom:12px;border:1px solid #e8e8e4}
.lbl{font-size:12px;color:#888;font-weight:600;margin-bottom:6px;margin-top:14px}
.lbl:first-child{margin-top:0}
input{width:100%;padding:12px 14px;border:1px solid #e0e0dc;border-radius:10px;font-size:16px;background:#fafaf8;color:#1a1a1a;outline:none;font-weight:500}
input:focus{border-color:#2d7a0e;background:#fff}
input::placeholder{color:#ccc;font-weight:400}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.est{background:#f4f9f0;border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin:10px 0}
.est-l{font-size:13px;color:#666;font-weight:500}.est-r{font-size:18px;font-weight:700;color:#2d7a0e}
.btn{width:100%;padding:14px;border:none;border-radius:11px;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px}
.btn-g{background:#1a1a1a;color:#fff}.btn-o{background:#c05a00;color:#fff}
.btn-gray{background:#f0f0ec;color:#888;margin-top:8px;font-size:15px;font-weight:500}
.rel{position:relative}
.drop{position:absolute;top:108%;left:0;right:0;background:#fff;border:1px solid #e0e0dc;border-radius:12px;max-height:220px;overflow-y:auto;z-index:99;box-shadow:0 6px 20px rgba(0,0,0,.1)}
.drop-item{padding:13px 14px;font-size:15px;color:#1a1a1a;border-bottom:1px solid #f0f0ec;cursor:pointer;font-weight:500;display:flex;justify-content:space-between}
.drop-item:last-child{border-bottom:none}
.dprice{font-size:13px;color:#2d7a0e;font-weight:600}
.drop-cat{padding:6px 14px;font-size:11px;color:#bbb;background:#fafaf8;font-weight:600;letter-spacing:.5px}
.mhd{display:flex;justify-content:space-between;align-items:center;padding:0 2px;margin-bottom:8px}
.mhd-l{font-size:16px;font-weight:700}.mhd-r{font-size:14px;font-weight:600;color:#2d7a0e}
table{width:100%;border-collapse:collapse;font-size:14px}
th{padding:10px 8px;text-align:left;font-size:11px;color:#bbb;border-bottom:1px solid #f0f0ec;font-weight:600;letter-spacing:.3px}
th.r{text-align:right}
td{padding:12px 8px;border-bottom:1px solid #f7f7f5;color:#1a1a1a;vertical-align:middle}
td.r{text-align:right}
td.dt{color:#bbb;font-size:13px}td.nm{font-weight:600;font-size:15px}
td.am{text-align:right;font-weight:700;font-size:15px}
.bz{display:inline-block;background:#f4f9f0;color:#2d7a0e;font-size:12px;padding:3px 9px;border-radius:6px;font-weight:600}
.bzt{display:inline-block;background:#fff4ee;color:#c05a00;font-size:12px;padding:3px 9px;border-radius:6px;font-weight:600}
.ab{background:none;border:none;cursor:pointer;font-size:17px;padding:2px;opacity:.5}
.tbar{background:#1a1a1a;border-radius:12px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.tbar-l{color:#aaa;font-size:14px}.tbar-r{color:#fff;font-size:22px;font-weight:700}
.sc{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:12px;border:1px solid #e8e8e4}
.sh{background:#fafaf8;padding:11px 16px;color:#888;font-size:11px;font-weight:600;letter-spacing:.5px;border-bottom:1px solid #f0f0ec}
.sr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #f7f7f5;font-size:15px;font-weight:500}
.sr:last-child{border-bottom:none}
.sv{font-weight:700;color:#2d7a0e;font-size:16px}
.sr.total{background:#fafaf8}
.red{color:#c05a00;font-weight:700}
.biz-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.biz-btn{padding:8px 16px;border:1px solid #e0e0dc;border-radius:20px;background:#fff;color:#888;font-size:13px;font-weight:500;cursor:pointer}
.biz-btn.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-weight:600}
.biz-card{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:12px;border:1px solid #e8e8e4}
.biz-hd{background:#1a1a1a;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
.biz-hd-l{color:#fff;font-size:17px;font-weight:700}.biz-hd-r{color:#7dde3c;font-size:17px;font-weight:700}
.biz-month{background:#fafaf8;padding:10px 16px;display:flex;justify-content:space-between;border-bottom:1px solid #f0f0ec}
.biz-month-l{font-size:14px;font-weight:600;color:#555}.biz-month-r{font-size:14px;font-weight:600;color:#2d7a0e}
.biz-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #f7f7f5}
.biz-row .nm2{font-weight:600;flex:1;font-size:15px}.biz-row .qty2{color:#bbb;font-size:13px;margin-right:10px}
.biz-row .amt2{font-weight:700;font-size:15px}
.biz-foot{background:#fafaf8;padding:13px 16px;display:flex;justify-content:space-between;border-top:1px solid #e8e8e4}
.biz-foot-l{font-size:14px;color:#888;font-weight:500}.biz-foot-r{font-size:17px;font-weight:700;color:#2d7a0e}
.buy-type{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:2px}
.btype{padding:13px;border:1px solid #e0e0dc;border-radius:11px;background:#fafaf8;font-size:15px;font-weight:600;cursor:pointer;text-align:center;color:#888}
.btype.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.qbtns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.qbtn{padding:7px 12px;border:1px solid #e0e0dc;border-radius:8px;background:#fafaf8;font-size:13px;font-weight:600;cursor:pointer;color:#555}
.pi{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f7f7f5}
.pi:last-child{border-bottom:none}
.pi-name{font-size:15px;font-weight:600;flex:1;padding-right:10px}
.pi input{width:110px;padding:9px 11px;font-size:15px;text-align:right;border-radius:9px;font-weight:600}
.pi-unit{font-size:14px;color:#bbb;margin-left:6px}
.cat-title{font-size:12px;font-weight:700;color:#888;background:#fafaf8;padding:8px 12px;border-radius:8px;margin-bottom:8px;letter-spacing:.5px}
.empty{text-align:center;padding:60px 20px;color:#ccc;font-size:16px}
.pane{display:none}.pane.on{display:block}
.msg{background:#f4f9f0;border:1px solid #c8e8a0;border-radius:10px;padding:11px 16px;font-size:14px;color:#2d7a0e;margin-bottom:12px;text-align:center;font-weight:600;display:none}
.msg.err{background:#fff4ee;border-color:#f0c8a0;color:#c05a00}
.notice{background:#fafaf8;border:1px solid #e8e8e4;border-radius:10px;padding:11px 16px;font-size:13px;color:#888;text-align:center;margin-bottom:12px}
.tpbtn{padding:13px;border:1px solid #e0e0dc;border-radius:11px;background:#fafaf8;color:#888;font-size:16px;font-weight:700;cursor:pointer;text-align:center}
.tpbtn.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
</style>
</head>
<body>
<div class="hd">
  <div><div class="hd-t">🌱 모종 단가표</div><div class="hd-s" id="sub">VAT 별도 · 자동저장</div></div>
  <div class="hd-r"><p>전체합계</p><strong id="htot">0원</strong></div>
</div>
<div class="wrap">
  <div class="msg" id="msg"></div>
  <div class="tabs">
    <button class="tab on" onclick="goTab('inp',this)">✏️ 입력</button>
    <button class="tab" onclick="goTab('tbl',this)">📋 목록</button>
    <button class="tab" onclick="goTab('biz',this)">🏪 거래처</button>
    <button class="tab" onclick="goTab('sum',this)">📊 합계</button>
    <button class="tab" onclick="goTab('prc',this)">💰 단가</button>
    <button class="tab" onclick="goTab('buy',this)">🛒 구매</button>
    <button class="tab" onclick="goTab('stat',this)">📈 통계</button>
  </div>

  <!-- 입력 -->
  <div id="pane-inp" class="pane on">
    <div class="card">
      <div class="lbl">날짜</div>
      <input type="date" id="idate">
      <div class="lbl">거래처</div>
      <div class="rel">
        <input type="text" id="ibiz" placeholder="검색 또는 직접입력" autocomplete="off"
          oninput="onBiz(this.value)" onfocus="onBiz(this.value)"
          onblur="setTimeout(function(){hide('dbiz')},200)">
        <div class="drop" id="dbiz" style="display:none"></div>
      </div>
      <div class="lbl">품목명</div>
      <div class="rel">
        <input type="text" id="iname" placeholder="검색 또는 직접입력" autocomplete="off"
          oninput="onItem(this.value)" onfocus="onItem(this.value)"
          onblur="setTimeout(function(){hide('ditem')},200)">
        <div class="drop" id="ditem" style="display:none"></div>
      </div>
      <div class="row2">
        <div><div class="lbl">수량</div><input type="number" id="iqty" placeholder="0" inputmode="numeric" oninput="upv()"></div>
        <div><div class="lbl">단가(원)</div><input type="number" id="ipr" placeholder="0" inputmode="numeric" oninput="upv()"></div>
      </div>
      <div class="est" id="est" style="display:none"><span class="est-l">예상합계</span><span class="est-r" id="estv"></span></div>
      <div class="lbl">🪴 트레이 <span style="color:#bbb;font-size:11px">(사용 수량 선택)</span></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px">
        <button id="ibtn-72구" class="tpbtn" data-key="72구" onclick="selInpTray('트레이 72구')">72구</button>
        <button id="ibtn-50구" class="tpbtn" data-key="50구" onclick="selInpTray('트레이 50구')">50구</button>
        <button id="ibtn-32구" class="tpbtn" data-key="32구" onclick="selInpTray('트레이 32구')">32구</button>
        <button id="ibtn-105구" class="tpbtn" data-key="105구" onclick="selInpTray('트레이 105구')">105구</button>
      </div>
      <div id="inp-tray-row" style="display:none;margin-bottom:4px">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="flex:1"><div class="lbl" style="margin-top:8px">트레이 수량</div><input type="number" id="inp-tray-qty" placeholder="0" inputmode="numeric" style="width:100%;padding:11px 14px;border:1px solid #e0e0dc;border-radius:10px;font-size:16px;background:#f4f9f0;color:#2d7a0e;outline:none;font-weight:700;box-sizing:border-box"></div>
          <div id="inp-tray-stock" style="margin-top:22px;text-align:center;min-width:60px;font-size:12px;color:#888"></div>
        </div>
      </div>
      <button class="btn btn-g" id="bmain" onclick="sub()">추가 · 저장</button>
      <button class="btn btn-gray" id="bcancel" style="display:none" onclick="cancel()">취소</button>
    </div>
  </div>

  <!-- 목록 -->
  <div id="pane-tbl" class="pane">
    <!-- 트레이 빠른입력 -->
    <div class="card" id="tray-quick-card" style="margin-bottom:12px">
      <div style="font-size:12px;color:#888;font-weight:600;margin-bottom:8px">🪴 트레이 빠른입력</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
        <button onclick="quickTray('트레이 72구')" style="padding:8px 14px;border:1px solid #e0e0dc;border-radius:8px;background:#fafaf8;font-size:13px;font-weight:600;cursor:pointer;color:#555">72구</button>
        <button onclick="quickTray('트레이 50구')" style="padding:8px 14px;border:1px solid #e0e0dc;border-radius:8px;background:#fafaf8;font-size:13px;font-weight:600;cursor:pointer;color:#555">50구</button>
        <button onclick="quickTray('트레이 32구')" style="padding:8px 14px;border:1px solid #e0e0dc;border-radius:8px;background:#fafaf8;font-size:13px;font-weight:600;cursor:pointer;color:#555">32구</button>
        <button onclick="quickTray('트레이 105구')" style="padding:8px 14px;border:1px solid #e0e0dc;border-radius:8px;background:#fafaf8;font-size:13px;font-weight:600;cursor:pointer;color:#555">105구</button>
        <button onclick="quickTray('상토')" style="padding:8px 14px;border:1px solid #e0e0dc;border-radius:8px;background:#fafaf8;font-size:13px;font-weight:600;cursor:pointer;color:#555">상토</button>
      </div>
      <div id="tray-quick-form" style="display:none">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px">
          <div><div style="font-size:11px;color:#888;font-weight:600;margin-bottom:4px">날짜</div><input type="date" id="tq-date" style="width:100%;padding:10px 12px;border:1px solid #e0e0dc;border-radius:10px;font-size:14px;background:#fafaf8;color:#1a1a1a;outline:none;font-weight:500;box-sizing:border-box"></div>
          <div><div style="font-size:11px;color:#888;font-weight:600;margin-bottom:4px">수량</div><input type="number" id="tq-qty" placeholder="0" inputmode="numeric" style="width:100%;padding:10px 12px;border:1px solid #e0e0dc;border-radius:10px;font-size:14px;background:#fafaf8;color:#1a1a1a;outline:none;font-weight:500;box-sizing:border-box"></div>
          <div><div style="font-size:11px;color:#888;font-weight:600;margin-bottom:4px">단가</div><input type="number" id="tq-price" placeholder="0" inputmode="numeric" style="width:100%;padding:10px 12px;border:1px solid #e0e0dc;border-radius:10px;font-size:14px;background:#fafaf8;color:#1a1a1a;outline:none;font-weight:500;box-sizing:border-box"></div>
        </div>
        <div style="font-size:11px;color:#888;font-weight:600;margin-bottom:4px">거래처</div>
        <input type="text" id="tq-biz" placeholder="거래처 (선택)" style="width:100%;padding:10px 12px;border:1px solid #e0e0dc;border-radius:10px;font-size:14px;background:#fafaf8;color:#1a1a1a;outline:none;font-weight:500;box-sizing:border-box;margin-bottom:8px">
        <div style="display:flex;gap:8px">
          <button onclick="addTrayQuick()" style="flex:1;padding:11px;border:none;border-radius:10px;background:#1a1a1a;color:#fff;font-size:14px;font-weight:700;cursor:pointer" id="tq-btn">추가</button>
          <button onclick="cancelTrayQuick()" style="padding:11px 16px;border:1px solid #e0e0dc;border-radius:10px;background:#f0f0ec;color:#888;font-size:14px;cursor:pointer">취소</button>
        </div>
      </div>
    </div>
    <div id="tbl-content"></div>
  </div>
  <!-- 거래처 -->
  <div id="pane-biz" class="pane"></div>
  <!-- 합계 -->
  <div id="pane-sum" class="pane"></div>

  <!-- 단가 -->
  <div id="pane-prc" class="pane">
    <div class="notice">단가 입력 후 저장하면 품목 선택 시 자동입력됩니다</div>
    <div id="price-list"></div>
    <button class="btn btn-g" id="savebtn" onclick="savePrices()" style="margin-top:4px">단가 저장</button>
  </div>

  <!-- 구매 -->
  <div id="pane-buy" class="pane">
    <div class="notice">트레이·씨앗 구매내역을 입력하세요</div>
    <div class="card">
      <div class="lbl">날짜</div>
      <input type="date" id="bdate">
      <div class="lbl">구분</div>
      <div class="buy-type">
        <button class="btype on" id="btype-tray" onclick="setBuyType('트레이')">🪴 트레이</button>
        <button class="btype" id="btype-seed" onclick="setBuyType('씨앗')">🌱 씨앗</button>
        <button class="btype" id="btype-etc" onclick="setBuyType('기타')">📦 기타</button>
      </div>
      <div class="lbl">품목명 <span style="color:#bbb;font-size:11px">빠른선택 →</span></div>
      <div class="qbtns">
        <button class="qbtn" onclick="quickBuy('트레이 72구')">72구</button>
        <button class="qbtn" onclick="quickBuy('트레이 50구')">50구</button>
        <button class="qbtn" onclick="quickBuy('트레이 32구')">32구</button>
        <button class="qbtn" onclick="quickBuy('트레이 105구')">105구</button>
        <button class="qbtn" onclick="quickBuy('상토')">상토</button>
      </div>
      <input type="text" id="bname" placeholder="직접입력">
      <div class="row2">
        <div><div class="lbl">수량</div><input type="number" id="bqty" placeholder="0" inputmode="numeric" oninput="upbv()"></div>
        <div><div class="lbl">금액(원)</div><input type="number" id="bamt" placeholder="0" inputmode="numeric" oninput="upbv()"></div>
      </div>
      <div class="est" id="best" style="display:none"><span class="est-l">개당 단가</span><span class="est-r" id="bestv"></span></div>
      <div class="lbl">메모</div>
      <input type="text" id="bmemo" placeholder="메모 (선택)">
      <button class="btn btn-g" id="bbmain" onclick="subBuy()">추가 · 저장</button>
      <button class="btn btn-gray" id="bbcancel" style="display:none" onclick="cancelBuy()">취소</button>
    </div>
    <div id="buy-list"></div>
  </div>

  <!-- 품목별 통계 -->
  <div id="pane-stat" class="pane"></div>
</div>

<!-- 트레이 팝업 -->
<div id="tray-pop" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px">
  <div style="background:#fff;border-radius:16px;padding:22px;width:100%;max-width:340px">
    <div style="font-size:16px;font-weight:700;margin-bottom:14px">🪴 트레이 선택</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      <button id="tpbtn-72구" class="tpbtn" data-key="72구" onclick="selectTrayType('트레이 72구')">72구</button>
      <button id="tpbtn-50구" class="tpbtn" data-key="50구" onclick="selectTrayType('트레이 50구')">50구</button>
      <button id="tpbtn-32구" class="tpbtn" data-key="32구" onclick="selectTrayType('트레이 32구')">32구</button>
      <button id="tpbtn-105구" class="tpbtn" data-key="105구" onclick="selectTrayType('트레이 105구')">105구</button>
    </div>
    <div style="font-size:12px;color:#888;font-weight:600;margin-bottom:6px">사용 수량</div>
    <input type="number" id="tp-qty" placeholder="0" inputmode="numeric" style="width:100%;padding:12px 14px;border:1px solid #e0e0dc;border-radius:10px;font-size:18px;font-weight:700;background:#fafaf8;color:#1a1a1a;outline:none;text-align:center;box-sizing:border-box">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px">
      <button onclick="clearTrayPop()" style="padding:12px;border:1px solid #e0e0dc;border-radius:10px;background:#f0f0ec;color:#888;font-size:14px;font-weight:600;cursor:pointer">지우기</button>
      <button onclick="saveTrayPop()" style="padding:12px;border:none;border-radius:10px;background:#1a1a1a;color:#fff;font-size:14px;font-weight:700;cursor:pointer">저장</button>
    </div>
    <button onclick="closeTrayPop()" style="width:100%;padding:10px;border:none;border-radius:10px;background:transparent;color:#bbb;font-size:13px;cursor:pointer;margin-top:6px">취소</button>
  </div>
</div>

<script>
var ITEMS={
  "과채류":["고추 모종","토마토 모종","방울토마토 모종","파프리카 모종","오이 모종","가지 모종","수박 모종","수박 접목 모종","참외 모종","멜론 모종","호박 모종","단호박 모종"],
  "엽채류":["상추 모종","깻잎 모종","시금치 모종","배추 모종","양배추 모종","브로콜리 모종","콜라비 모종","쑥갓 모종","청경채 모종","케일 모종"],
  "근채·파류":["대파 모종","쪽파 모종","양파 모종","마늘 모종","부추 모종"],
  "허브·특용":["바질 모종","로즈마리 모종","민트 모종","고수 모종","딸기 모종"],
  "구황·특용":["고구마 모종","토란 모종","여주 모종","수세미 모종","비트 모종","근대 모종","아욱 모종","치커리 모종","적근대 모종","신선초 모종"],
  "곡류·두류":["옥수수 모종","들깨 모종","참깨 모종","땅콩 모종","강낭콩 모종","완두콩 모종"],
  "화훼류":["국화 모종","봉선화 모종","채송화 모종","한련화 모종","라벤더 모종","금잔화 모종"],
  "트레이·자재":["트레이 72구","트레이 50구","트레이 32구","트레이 105구","상토"]
};
var TRAYS=["트레이 72구","트레이 50구","트레이 32구","트레이 105구","상토"];
var TRAY_ITEMS=["트레이 72구","트레이 50구","트레이 32구","트레이 105구"];
var MINUS_ITEMS=["트레이 72구","트레이 50구","트레이 32구","트레이 105구","상토"];
function isMinus(name){ return MINUS_ITEMS.indexOf(name)>=0; }

var rows=[],eid=null,prices={},buys=[],beid=null,buyType='트레이',selBiz='all';
var KEY='mujong-v1',PKEY='mujong-prices',BKEY='mujong-buys',TKEY='mujong-tray-stock';
var trayStock={};

function fmt(n){return Number(n).toLocaleString('ko-KR');}
function isTray(name){return TRAY_ITEMS.indexOf(name)>=0;}

function flash(m,err){
  var el=document.getElementById('msg');
  el.textContent=m;el.style.display='block';
  el.className='msg'+(err?' err':'');
  setTimeout(function(){el.style.display='none';},3000);
}
function hide(id){document.getElementById(id).style.display='none';}

// 저장/로드 - 에러 상세 표시
function lsSave(k,v){
  try{
    var s=JSON.stringify(v);
    localStorage.setItem(k,s);
    return true;
  }catch(e){
    flash('⚠️ 저장실패: '+e.message,true);
    return false;
  }
}
function lsLoad(k){
  try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}
  catch(e){return null;}
}
function load(){
  var d=lsLoad(KEY);if(d&&d.length){rows=d;flash('✅ '+d.length+'건 불러왔습니다');}
  var p=lsLoad(PKEY);if(p)prices=p;
  var bv=lsLoad(BKEY);if(bv)buys=bv;
  var tv=lsLoad(TKEY);if(tv)trayStock=tv;
  setBuyType('트레이');renderAll();
}
function save(){
  if(lsSave(KEY,rows)){
    var s=document.getElementById('sub');
    s.textContent='저장됨';
    setTimeout(function(){s.textContent='VAT 별도 · 자동저장';},2000);
  }
}
function savePrices(){
  var all=[];
  TRAYS.forEach(function(n){all.push(n);});
  Object.values(ITEMS).forEach(function(l){l.forEach(function(n){all.push(n);});});
  all.forEach(function(n){
    var sid='pf_'+n.replace(/\s/g,'_').replace(/·/g,'_');
    var el=document.getElementById(sid);
    if(el){
      var raw=el.value.trim();
      if(raw==='')delete prices[n];
      else prices[n]=parseInt(raw,10)||0;
    }
  });
  if(lsSave(PKEY,prices)){
    flash('단가 저장 완료');
    var btn=document.getElementById('savebtn');
    btn.textContent='저장됨';
    setTimeout(function(){btn.textContent='단가 저장';},2000);
  }
}
function saveBuys(){if(lsSave(BKEY,buys)){flash('저장됨');renderTbl();}}

function setBuyType(t){
  buyType=t;
  ['트레이','씨앗','기타'].forEach(function(tp){
    var id=tp==='트레이'?'btype-tray':tp==='씨앗'?'btype-seed':'btype-etc';
    var el=document.getElementById(id);
    if(el){if(t===tp)el.classList.add('on');else el.classList.remove('on');}
  });
}
function quickBuy(name){
  document.getElementById('bname').value=name;
  if(name==='상토')setBuyType('기타');else setBuyType('트레이');
}

function bizList(){return Array.from(new Set(rows.filter(function(r){return r.biz;}).map(function(r){return r.biz;})));}
function onBiz(q){
  var d=document.getElementById('dbiz'),list=bizList(),f=q?list.filter(function(b){return b.indexOf(q)>=0;}):list,h='';
  f.forEach(function(b){h+='<div class="drop-item" onmousedown="pickBiz(\''+b+'\')">'+b+'</div>';});
  if(h){d.innerHTML=h;d.style.display='block';}else d.style.display='none';
}
function pickBiz(b){document.getElementById('ibiz').value=b;hide('dbiz');}
function onItem(q){
  var d=document.getElementById('ditem'),h='';
  Object.entries(ITEMS).forEach(function(e){
    var c=e[0],l=e[1],f=q?l.filter(function(p){return p.indexOf(q)>=0;}):l;
    if(f.length){
      h+='<div class="drop-cat">'+c+'</div>';
      f.forEach(function(p){
        var pr=prices[p]?'<span class="dprice">'+fmt(prices[p])+'원</span>':'';
        h+='<div class="drop-item" onmousedown="pickItem(\''+p+'\')"><span>'+p+'</span>'+pr+'</div>';
      });
    }
  });
  if(h){d.innerHTML=h;d.style.display='block';}else d.style.display='none';
}
function pickItem(p){
  document.getElementById('iname').value=p;
  hide('ditem');
  if(prices[p]){document.getElementById('ipr').value=prices[p];upv();}
}
function upv(){
  var q=+document.getElementById('iqty').value,p=+document.getElementById('ipr').value,el=document.getElementById('est');
  if(q&&p){document.getElementById('estv').textContent=fmt(q*p)+' 원';el.style.display='flex';}else el.style.display='none';
}
function sub(){
  var d=document.getElementById('idate').value,b=document.getElementById('ibiz').value.trim(),
      n=document.getElementById('iname').value.trim(),q=+document.getElementById('iqty').value,p=+document.getElementById('ipr').value;
  if(!d||!n||!q||!p)return;
  var e={date:d,biz:b,name:n,qty:q,price:p,id:eid||Date.now()};
  // 트레이 입력값 저장
  var tq=+document.getElementById('inp-tray-qty').value;
  if(_inpTrayName&&tq>0){
    e.tray={name:_inpTrayName,qty:tq};
  } else if(eid){
    var old=rows.find(function(r){return r.id===eid;});
    if(old&&old.tray)e.tray=old.tray;
  }
  if(eid)rows=rows.map(function(r){return r.id===eid?e:r;});else rows.push(e);
  eid=null;save();clr();goTab('tbl',document.querySelectorAll('.tab')[1]);
}
function clr(){
  document.getElementById('ibiz').value='';document.getElementById('iname').value='';
  document.getElementById('iqty').value='';document.getElementById('ipr').value='';
  document.getElementById('est').style.display='none';
  document.getElementById('bmain').textContent='추가 · 저장';
  document.getElementById('bmain').className='btn btn-g';
  document.getElementById('bcancel').style.display='none';
  // 트레이 초기화
  _inpTrayName='';
  ['72구','50구','32구','105구'].forEach(function(k){var b=document.getElementById('ibtn-'+k);if(b)b.className='tpbtn';});
  document.getElementById('inp-tray-row').style.display='none';
  document.getElementById('inp-tray-qty').value='';
  eid=null;
}
function cancel(){clr();}
function del(id){rows=rows.filter(function(r){return r.id!==id;});save();renderAll();}
function ed(id){
  var r=rows.find(function(r){return r.id===id;});if(!r)return;
  document.getElementById('idate').value=r.date;document.getElementById('ibiz').value=r.biz||'';
  document.getElementById('iname').value=r.name;document.getElementById('iqty').value=r.qty;
  document.getElementById('ipr').value=r.price;eid=id;upv();
  // 트레이 복원
  if(r.tray&&r.tray.name){
    selInpTray(r.tray.name);
    document.getElementById('inp-tray-qty').value=r.tray.qty;
  } else {
    clr();
    document.getElementById('idate').value=r.date;document.getElementById('ibiz').value=r.biz||'';
    document.getElementById('iname').value=r.name;document.getElementById('iqty').value=r.qty;
    document.getElementById('ipr').value=r.price;eid=id;upv();
  }
  document.getElementById('bmain').textContent='수정 완료';
  document.getElementById('bmain').className='btn btn-o';
  document.getElementById('bcancel').style.display='block';
  goTab('inp',document.querySelectorAll('.tab')[0]);window.scrollTo(0,0);
}
function upbv(){
  var q=+document.getElementById('bqty').value,a=+document.getElementById('bamt').value,el=document.getElementById('best');
  if(q&&a){document.getElementById('bestv').textContent=fmt(Math.round(a/q))+'원/개';el.style.display='flex';}else el.style.display='none';
}
function subBuy(){
  var d=document.getElementById('bdate').value,n=document.getElementById('bname').value.trim(),
      q=+document.getElementById('bqty').value,a=+document.getElementById('bamt').value,
      m=document.getElementById('bmemo').value.trim();
  if(!d||!n||!q||!a)return;
  var e={date:d,type:buyType,name:n,qty:q,amt:a,memo:m,id:beid||Date.now()};
  if(beid)buys=buys.map(function(b){return b.id===beid?e:b;});else buys.push(e);
  beid=null;saveBuys();clrBuy();renderBuyList();
}
function clrBuy(){
  document.getElementById('bname').value='';document.getElementById('bqty').value='';
  document.getElementById('bamt').value='';document.getElementById('bmemo').value='';
  document.getElementById('best').style.display='none';
  document.getElementById('bbmain').textContent='추가 · 저장';
  document.getElementById('bbmain').className='btn btn-g';
  document.getElementById('bbcancel').style.display='none';beid=null;setBuyType('트레이');
}
function cancelBuy(){clrBuy();}
function delBuy(id){buys=buys.filter(function(b){return b.id!==id;});saveBuys();renderBuyList();}
function edBuy(id){
  var b=buys.find(function(b){return b.id===id;});if(!b)return;
  document.getElementById('bdate').value=b.date;document.getElementById('bname').value=b.name;
  document.getElementById('bqty').value=b.qty;document.getElementById('bamt').value=b.amt;
  document.getElementById('bmemo').value=b.memo||'';
  beid=id;setBuyType(b.type);upbv();
  document.getElementById('bbmain').textContent='수정 완료';
  document.getElementById('bbmain').className='btn btn-o';
  document.getElementById('bbcancel').style.display='block';window.scrollTo(0,0);
}

function goTab(t,btn){
  document.querySelectorAll('.pane').forEach(function(p){p.classList.remove('on');});
  document.getElementById('pane-'+t).classList.add('on');
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  if(t==='tbl')renderTbl();if(t==='biz')renderBiz();if(t==='sum')renderSum();
  if(t==='prc')buildPriceList();if(t==='buy')renderBuyList();if(t==='stat')renderStat();
}
function renderAll(){
  var tot=rows.reduce(function(s,r){return s+r.qty*r.price;},0);
  document.getElementById('htot').textContent=fmt(tot)+'원';
  renderTbl();renderSum();
  var bl=document.getElementById('buy-list');
  if(bl&&bl.children.length)renderBuyList();
}

function renderTbl(){
  var c=document.getElementById('pane-tbl');
  var tc=document.getElementById('tbl-content');var target=tc||c;
  if(!rows.length){target.innerHTML='<div class="empty">항목을 추가해주세요</div>';return;}
  var s=rows.slice().sort(function(a,b){return a.date.localeCompare(b.date);}),m={};
  s.forEach(function(r){var k=r.date.slice(0,7);if(!m[k])m[k]=[];m[k].push(r);});
  var h='';
  Object.entries(m).forEach(function(e){
    var mo=e[0],items=e[1],mT=0,pt=mo.split('-');
    items.forEach(function(r){mT+=r.qty*r.price;});
    h+='<div class="mhd"><span class="mhd-l">'+pt[0]+'년 '+pt[1]+'월</span><span class="mhd-r">'+fmt(mT)+' 원</span></div>';
    h+='<div class="card" style="padding:0;overflow:hidden;margin-bottom:12px"><div style="overflow-x:auto"><table><thead><tr><th>날짜</th><th>거래처</th><th>품목</th><th class="r">수량</th><th class="r">단가</th><th class="r">합계</th><th class="r" style="color:#2d7a0e">🪴트레이</th><th></th></tr></thead><tbody>';
    items.forEach(function(r,i){
      var bg=i%2===0?'#fff':'#fafaf8';
      var tr=isTray(r.name)||isMinus(r.name);
      var bztag=tr?'<span class="bzt">'+(r.biz||'-')+'</span>':'<span class="bz">'+(r.biz||'-')+'</span>';
      var amtColor=tr?'color:#c05a00':'color:#1a1a1a';
      var trayVal=r.tray||'';
      h+='<tr style="background:'+bg+'"><td class="dt">'+r.date.slice(5)+'</td><td>'+bztag+'</td>';
      h+='<td class="nm">'+(tr?'🪴 ':'')+r.name+'</td>';
      h+='<td class="r">'+fmt(r.qty)+'</td><td class="r">'+fmt(r.price)+'</td>';
      h+='<td class="r" style="font-weight:700;'+amtColor+'">'+(tr?'- ':'')+fmt(r.qty*r.price)+'</td>';
      // tray = {name:'트레이 72구', qty:50} 형태
      var trayInfo=r.tray||null;
      var trayLabel=trayInfo?(trayInfo.name?trayInfo.name.replace('트레이 ','')+' '+fmt(trayInfo.qty)+'개':''):'';
      h+='<td class="r"><button onclick="openTrayPop('+r.id+')" style="padding:6px 10px;border:1px solid '+(trayInfo?'#2d7a0e':'#e0e0dc')+';border-radius:8px;background:'+(trayInfo?'#f4f9f0':'#fafaf8')+';color:'+(trayInfo?'#2d7a0e':'#bbb')+';font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap">'+(trayInfo?trayLabel:'선택')+'</button></td>';
      h+='<td style="text-align:center"><button class="ab" onclick="ed('+r.id+')">✏️</button><button class="ab" onclick="del('+r.id+')">🗑️</button></td></tr>';
    });
    h+='</tbody></table></div></div>';
  });
  var tot=rows.reduce(function(s,r){return s+r.qty*r.price;},0);
  h+='<div class="tbar"><span class="tbar-l">전체 합계</span><span class="tbar-r">'+fmt(tot)+' 원</span></div>';

  // ── 트레이 수량 현황 ──
  // 구매수량 = buys 탭 (type=트레이) name별 합산
  var buyQtyMap={};
  if(buys&&buys.length){
    buys.forEach(function(b){
      if(b.type==='트레이'||b.type==='기타'){
        if(MINUS_ITEMS.indexOf(b.name)>=0){
          buyQtyMap[b.name]=(buyQtyMap[b.name]||0)+b.qty;
        }
      }
    });
  }
  // 판매수량 = rows의 r.tray 팝업 입력값 (name, qty)
  var sellQtyMap={};
  rows.forEach(function(r){
    if(r.tray&&r.tray.name&&r.tray.qty>0){
      sellQtyMap[r.tray.name]=(sellQtyMap[r.tray.name]||0)+r.tray.qty;
    }
  });

  // 표시할 품목: buyQtyMap + sellQtyMap 합집합
  var trayKeys={};
  MINUS_ITEMS.forEach(function(n){
    if(buyQtyMap[n]||sellQtyMap[n])trayKeys[n]=1;
  });

  if(Object.keys(trayKeys).length){
    h+='<div class="sc"><div class="sh">🪴 트레이 수량 현황</div>';
    h+='<div style="display:grid;grid-template-columns:1fr 80px 80px 80px;background:#fafaf8;padding:9px 16px;border-bottom:1px solid #e8e8e4">';
    h+='<span style="font-size:11px;color:#bbb;font-weight:600">품목</span>';
    h+='<span style="font-size:11px;color:#2d7a0e;font-weight:700;text-align:center">구매</span>';
    h+='<span style="font-size:11px;color:#c05a00;font-weight:700;text-align:center">판매</span>';
    h+='<span style="font-size:11px;color:#1a1a1a;font-weight:700;text-align:right">잔여</span></div>';
    var gBuy=0,gSell=0;
    MINUS_ITEMS.forEach(function(name){
      if(!trayKeys[name])return;
      var buy=buyQtyMap[name]||0;
      var sell=sellQtyMap[name]||0;
      var left=buy-sell;
      gBuy+=buy; gSell+=sell;
      var lc=left>0?'#1a1a1a':left<0?'#c05a00':'#bbb';
      h+='<div style="display:grid;grid-template-columns:1fr 80px 80px 80px;padding:12px 16px;border-bottom:1px solid #f7f7f5;align-items:center">';
      h+='<span style="font-size:14px;font-weight:600">'+name+'</span>';
      h+='<span style="font-size:15px;font-weight:700;text-align:center;color:#2d7a0e">'+(buy>0?fmt(buy):'-')+'</span>';
      h+='<span style="font-size:15px;font-weight:700;text-align:center;color:#c05a00">'+(sell>0?fmt(sell):'-')+'</span>';
      h+='<span style="font-size:16px;font-weight:700;text-align:right;color:'+lc+'">'+(buy>0||sell>0?fmt(left):'-')+'</span>';
      h+='</div>';
    });
    var gLeft=gBuy-gSell;
    h+='<div style="display:grid;grid-template-columns:1fr 80px 80px 80px;padding:13px 16px;background:#fafaf8;border-top:2px solid #e8e8e4">';
    h+='<span style="font-size:14px;font-weight:700">합계</span>';
    h+='<span style="font-size:15px;font-weight:700;text-align:center;color:#2d7a0e">'+fmt(gBuy)+'</span>';
    h+='<span style="font-size:15px;font-weight:700;text-align:center;color:#c05a00">'+fmt(gSell)+'</span>';
    h+='<span style="font-size:16px;font-weight:700;text-align:right;color:'+(gLeft>=0?'#1a1a1a':'#c05a00')+'">'+fmt(gLeft)+'</span>';
    h+='</div></div>';
  }

  // tbl-content 에 렌더 (카드는 유지)
  var tc=document.getElementById('tbl-content');
  if(tc)tc.innerHTML=h;else c.innerHTML=h;
}

function renderBiz(){
  var c=document.getElementById('pane-biz');
  if(!rows.length){c.innerHTML='<div class="empty">항목을 추가해주세요</div>';return;}
  var bn=bizList();if(!bn.length){c.innerHTML='<div class="empty">거래처를 입력해주세요</div>';return;}
  var h='<div class="biz-filter"><button class="biz-btn'+(selBiz==='all'?' on':'')+'" onclick="filterBiz(\'all\',this)">전체</button>';
  bn.forEach(function(b){h+='<button class="biz-btn'+(selBiz===b?' on':'')+'" onclick="filterBiz(\''+b+'\',this)">'+b+'</button>';});
  h+='</div>';
  var filtered=selBiz==='all'?bn:[selBiz];
  filtered.forEach(function(bname){
    var br=rows.filter(function(r){return r.biz===bname;});if(!br.length)return;
    var bT=0;br.forEach(function(r){bT+=r.qty*r.price;});
    var mm={};br.slice().sort(function(a,b){return a.date.localeCompare(b.date);}).forEach(function(r){var k=r.date.slice(0,7);if(!mm[k])mm[k]=[];mm[k].push(r);});
    h+='<div class="biz-card"><div class="biz-hd"><span class="biz-hd-l">'+bname+'</span><span class="biz-hd-r">'+fmt(bT)+' 원</span></div>';
    Object.entries(mm).forEach(function(e){
      var mo=e[0],items=e[1],pt=mo.split('-'),mT=0;items.forEach(function(r){mT+=r.qty*r.price;});

function copyTxt(txt){
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(function(){showMsg('📋 복사됐어요! 카톡에 붙여넣기');});
  } else {
    var ta=document.createElement('textarea');
    ta.value=txt;document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    showMsg('📋 복사됐어요!');
  }
}

  if(topItem){
    h+='<div style="margin-top:10px;background:#fafaf8;border-radius:10px;padding:12px">';
    h+='<div style="font-size:11px;color:#888;font-weight:600;margin-bottom:4px">🏆 최다 판매</div>';
    h+='<div style="font-size:16px;font-weight:700;color:#1a1a1a">'+topItem[0]+'</div>';
    h+='<div style="font-size:13px;color:#2d7a0e;font-weight:600;margin-top:2px">'+fmt(topItem[1].qty)+'개 · '+fmt(topItem[1].amt)+'원</div>';
    h+='</div>';
  }
  h+='</div>';

  // 품목별 상세
  h+='<div class="sc"><div class="sh">📈 품목별 통계 (금액순)</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 70px 70px 90px;background:#fafaf8;padding:9px 16px;border-bottom:1px solid #e8e8e4">';
  h+='<span style="font-size:11px;color:#bbb;font-weight:600">품목</span>';
  h+='<span style="font-size:11px;color:#bbb;font-weight:600;text-align:center">횟수</span>';
  h+='<span style="font-size:11px;color:#bbb;font-weight:600;text-align:right">수량</span>';
  h+='<span style="font-size:11px;color:#bbb;font-weight:600;text-align:right">금액</span></div>';

  sorted.forEach(function(e){
    var n=e[0],v=e[1];
    var pct=totalAmt>0?Math.round(v.amt/totalAmt*100):0;
    var bizList=Object.keys(v.bizSet).join(', ');
    h+='<div style="padding:12px 16px;border-bottom:1px solid #f7f7f5">';
    // 이름 + 거래처
    h+='<div style="display:grid;grid-template-columns:1fr 70px 70px 90px;align-items:center;margin-bottom:6px">';
    h+='<span style="font-size:14px;font-weight:700">'+n+'</span>';
    h+='<span style="font-size:13px;color:#888;text-align:center">'+v.cnt+'회</span>';
    h+='<span style="font-size:14px;font-weight:600;text-align:right">'+fmt(v.qty)+'개</span>';
    h+='<span style="font-size:14px;font-weight:700;color:#2d7a0e;text-align:right">'+fmt(v.amt)+'</span>';
    h+='</div>';
    // 비율 바
    h+='<div style="background:#f0f0ec;border-radius:4px;height:4px;overflow:hidden">';
    h+='<div style="background:#2d7a0e;height:4px;width:'+pct+'%;border-radius:4px"></div></div>';
    if(bizList)h+='<div style="font-size:11px;color:#bbb;margin-top:4px">거래처: '+bizList+'</div>';
    h+='</div>';
  });

  // 전체 합계
  h+='<div style="display:grid;grid-template-columns:1fr 70px 70px 90px;padding:13px 16px;background:#fafaf8;border-top:2px solid #e8e8e4">';
  h+='<span style="font-size:14px;font-weight:700">합계</span>';
  h+='<span style="font-size:13px;font-weight:600;text-align:center;color:#888">'+rows.length+'건</span>';
  h+='<span style="font-size:14px;font-weight:700;text-align:right">'+fmt(totalQty)+'개</span>';
  h+='<span style="font-size:15px;font-weight:700;color:#2d7a0e;text-align:right">'+fmt(totalAmt)+'</span>';
  h+='</div></div>';

  c.innerHTML=h;
}
var tqName='';
function quickTray(name){
  tqName=name;
  // 단가 자동입력
  if(prices[name])document.getElementById('tq-price').value=prices[name];
  // 오늘 날짜
  var today=new Date();
  var yy=today.getFullYear();
  var mm=String(today.getMonth()+1).padStart(2,'0');
  var dd=String(today.getDate()).padStart(2,'0');
  document.getElementById('tq-date').value=yy+'-'+mm+'-'+dd;
  document.getElementById('tray-quick-form').style.display='block';
  document.getElementById('tq-btn').textContent=name+' 추가';
}
function cancelTrayQuick(){
  document.getElementById('tray-quick-form').style.display='none';
  document.getElementById('tq-qty').value='';
  document.getElementById('tq-price').value='';
  document.getElementById('tq-biz').value='';
  tqName='';
}
function addTrayQuick(){
  var d=document.getElementById('tq-date').value;
  var q=+document.getElementById('tq-qty').value;
  var p=+document.getElementById('tq-price').value;
  var b=document.getElementById('tq-biz').value.trim();
  if(!d||!tqName||!q||!p)return;
  var e={date:d,biz:b,name:tqName,qty:q,price:p,id:Date.now()};
  rows.push(e);
  save();
  renderAll();
  cancelTrayQuick();
}
load();
