<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>계산서</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Malgun Gothic',sans-serif;background:#f7f7f5;min-height:100vh}
.hd{background:#1a1a1a;padding:18px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.hd-t{color:#fff;font-size:20px;font-weight:700}
.hd-s{color:#aaa;font-size:12px;margin-top:2px}
.hd-r{text-align:right}
.hd-r p{color:#aaa;font-size:12px}
.hd-r strong{color:#7dde3c;font-size:22px;font-weight:700;display:block}
.wrap{padding:14px}
.card{background:#fff;border-radius:14px;padding:18px;margin-bottom:12px;border:1px solid #e8e8e4}
.lbl{font-size:12px;color:#888;font-weight:600;margin-bottom:6px;margin-top:14px}
.lbl:first-child{margin-top:0}
input{width:100%;padding:13px 15px;border:1px solid #e0e0dc;border-radius:10px;font-size:16px;background:#fafaf8;color:#1a1a1a;outline:none;font-weight:500}
input:focus{border-color:#1a1a1a;background:#fff}
input::placeholder{color:#ccc;font-weight:400}
.items{margin-bottom:12px}
.item-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.item-row input.nm{flex:2}
.item-row input.amt{flex:1;text-align:right}
.item-row .del{width:36px;height:36px;border:none;background:#f0f0ec;border-radius:8px;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.add-btn{width:100%;padding:13px;border:1px dashed #ccc;border-radius:10px;background:#fafaf8;color:#888;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:12px}
.total-box{background:#1a1a1a;border-radius:12px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.total-box span:first-child{color:#aaa;font-size:15px}
.total-box span:last-child{color:#7dde3c;font-size:24px;font-weight:700}
.btn{width:100%;padding:14px;border:none;border-radius:11px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px}
.btn-g{background:#1a1a1a;color:#fff}
.btn-gray{background:#f0f0ec;color:#888}
.list-item{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #f7f7f5;font-size:15px}
.list-item:last-child{border-bottom:none}
.li-l{font-weight:600;color:#1a1a1a}
.li-r{font-weight:700;color:#1a1a1a;font-size:16px}
.li-biz{font-size:12px;color:#888;margin-top:2px}
.sc{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:12px;border:1px solid #e8e8e4}
.sh{background:#fafaf8;padding:11px 16px;color:#888;font-size:11px;font-weight:600;letter-spacing:.5px;border-bottom:1px solid #e8e8e4}
.mhd{display:flex;justify-content:space-between;padding:0 2px;margin-bottom:8px;align-items:center}
.mhd-l{font-size:16px;font-weight:700}
.mhd-r{font-size:14px;font-weight:600;color:#2d7a0e}
.empty{text-align:center;padding:50px 20px;color:#ccc;font-size:16px}
.tabs{display:flex;gap:4px;margin-bottom:16px}
.tab{flex:1;padding:10px;border:1px solid #e0e0dc;border-radius:20px;background:#fff;color:#888;font-size:14px;cursor:pointer;font-weight:500;text-align:center}
.tab.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-weight:700}
.pane{display:none}.pane.on{display:block}
.msg{background:#f4f9f0;border:1px solid #c8e8a0;border-radius:10px;padding:11px 16px;font-size:14px;color:#2d7a0e;margin-bottom:12px;text-align:center;font-weight:600;display:none}
.print-btn{width:100%;padding:13px;border:none;border-radius:11px;background:#2d7a0e;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
@media print{
  .tabs,.hd,.add-btn,.btn,.print-btn,.del{display:none!important}
  .pane{display:block!important}
  body{background:#fff}
  .card,.sc{border:none;box-shadow:none}
}
</style>
</head>
<body>
<div class="hd">
  <div><div class="hd-t">🧾 계산서</div><div class="hd-s" id="sub">자동저장</div></div>
  <div class="hd-r"><p>합계</p><strong id="htot">0원</strong></div>
</div>
<div class="wrap">
  <div class="msg" id="msg"></div>
  <div class="tabs">
    <button class="tab on" onclick="goTab('write',this)">✏️ 작성</button>
    <button class="tab" onclick="goTab('list',this)">📋 목록</button>
  </div>

  <!-- 작성 -->
  <div id="pane-write" class="pane on">
    <div class="card">
      <div class="lbl">날짜</div>
      <input type="date" id="idate">
      <div class="lbl">거래처</div>
      <input type="text" id="ibiz" placeholder="거래처 이름 (선택)">
      <div class="lbl">품목</div>
      <div class="items" id="items">
        <div class="item-row">
          <input class="nm" type="text" placeholder="품목명">
          <input class="amt" type="number" placeholder="금액" inputmode="numeric">
          <button class="del" onclick="delItem(this)">×</button>
        </div>
      </div>
      <button class="add-btn" onclick="addItem()">+ 품목 추가</button>
      <div class="total-box">
        <span>합계</span>
        <span id="cur-total">0원</span>
      </div>
      <button class="btn btn-g" id="smain" onclick="saveDoc()">💾 저장</button>
      <button class="btn btn-gray" id="scancel" style="display:none" onclick="cancelEdit()">취소</button>
    </div>
  </div>

  <!-- 목록 -->
  <div id="pane-list" class="pane"></div>
</div>

<script>
var docs=[],editId=null;
var KEY='calc-v1';
function fmt(n){return Number(n).toLocaleString('ko-KR');}
function flash(m){var el=document.getElementById('msg');el.textContent=m;el.style.display='block';setTimeout(function(){el.style.display='none';},2500);}

function load(){
  try{var v=localStorage.getItem(KEY);if(v){var d=JSON.parse(v);if(d&&d.length){docs=d;flash('✅ '+d.length+'건 불러왔습니다');}}}catch(e){}
  updateTotal();renderList();
}
function lsSave(){
  try{localStorage.setItem(KEY,JSON.stringify(docs));var s=document.getElementById('sub');s.textContent='저장됨';setTimeout(function(){s.textContent='자동저장';},2000);}catch(e){}
}

function addItem(){
  var row=document.createElement('div');
  row.className='item-row';
  row.innerHTML='<input class="nm" type="text" placeholder="품목명"><input class="amt" type="number" placeholder="금액" inputmode="numeric"><button class="del" onclick="delItem(this)">×</button>';
  row.querySelector('.amt').addEventListener('input',updateTotal);
  document.getElementById('items').appendChild(row);
}
function delItem(btn){
  var rows=document.getElementById('items').querySelectorAll('.item-row');
  if(rows.length>1)btn.parentNode.remove();
  updateTotal();
}
function updateTotal(){
  var total=0;
  document.querySelectorAll('.amt').forEach(function(el){total+=+el.value||0;});
  document.getElementById('cur-total').textContent=fmt(total)+'원';
  var tot=docs.reduce(function(s,d){return s+d.total;},0);
  document.getElementById('htot').textContent=fmt(tot+total)+'원';
}

function getItems(){
  var items=[];
  document.querySelectorAll('#items .item-row').forEach(function(row){
    var nm=row.querySelector('.nm').value.trim();
    var amt=+row.querySelector('.amt').value||0;
    if(nm||amt)items.push({nm:nm,amt:amt});
  });
  return items;
}

function saveDoc(){
  var date=document.getElementById('idate').value;
  var biz=document.getElementById('ibiz').value.trim();
  var items=getItems();
  if(!date||!items.length)return;
  var total=items.reduce(function(s,i){return s+i.amt;},0);
  var doc={date:date,biz:biz,items:items,total:total,id:editId||Date.now()};
  if(editId)docs=docs.map(function(d){return d.id===editId?doc:d;});
  else docs.push(doc);
  editId=null;lsSave();resetForm();goTab('list',document.querySelectorAll('.tab')[1]);
}
function resetForm(){
  document.getElementById('idate').value='';
  document.getElementById('ibiz').value='';
  document.getElementById('items').innerHTML='<div class="item-row"><input class="nm" type="text" placeholder="품목명"><input class="amt" type="number" placeholder="금액" inputmode="numeric"><button class="del" onclick="delItem(this)">×</button></div>';
  document.querySelector('.amt').addEventListener('input',updateTotal);
  updateTotal();
  document.getElementById('smain').textContent='💾 저장';
  document.getElementById('scancel').style.display='none';
  editId=null;
}
function cancelEdit(){resetForm();}
function delDoc(id){
  docs=docs.filter(function(d){return d.id!==id;});
  lsSave();renderList();updateTotal();
}
function editDoc(id){
  var d=docs.find(function(d){return d.id===id;});if(!d)return;
  document.getElementById('idate').value=d.date;
  document.getElementById('ibiz').value=d.biz||'';
  var cont=document.getElementById('items');
  cont.innerHTML='';
  d.items.forEach(function(item){
    var row=document.createElement('div');
    row.className='item-row';
    row.innerHTML='<input class="nm" type="text" placeholder="품목명" value="'+item.nm+'"><input class="amt" type="number" placeholder="금액" inputmode="numeric" value="'+item.amt+'"><button class="del" onclick="delItem(this)">×</button>';
    row.querySelector('.amt').addEventListener('input',updateTotal);
    cont.appendChild(row);
  });
  editId=id;updateTotal();
  document.getElementById('smain').textContent='✅ 수정 완료';
  document.getElementById('scancel').style.display='block';
  goTab('write',document.querySelectorAll('.tab')[0]);window.scrollTo(0,0);
}
function printDoc(id){
  var d=docs.find(function(d){return d.id===id;});if(!d)return;
  var w=window.open('','_blank');
  var rows=d.items.map(function(i){return '<tr><td style="padding:10px;border-bottom:1px solid #eee;font-size:16px">'+i.nm+'</td><td style="padding:10px;border-bottom:1px solid #eee;text-align:right;font-size:16px;font-weight:700">'+fmt(i.amt)+'원</td></tr>';}).join('');
  w.document.write('<html><head><meta charset="UTF-8"><title>계산서</title></head><body style="font-family:sans-serif;padding:30px;max-width:400px;margin:0 auto">');
  w.document.write('<h2 style="margin-bottom:4px">🧾 계산서</h2>');
  w.document.write('<p style="color:#888;margin-bottom:20px">'+d.date+(d.biz?' · '+d.biz:'')+'</p>');
  w.document.write('<table style="width:100%;border-collapse:collapse"><thead><tr><th style="text-align:left;padding:10px;border-bottom:2px solid #1a1a1a;font-size:14px">품목</th><th style="text-align:right;padding:10px;border-bottom:2px solid #1a1a1a;font-size:14px">금액</th></tr></thead><tbody>'+rows+'</tbody></table>');
  w.document.write('<div style="margin-top:16px;padding:16px;background:#1a1a1a;border-radius:10px;display:flex;justify-content:space-between"><span style="color:#aaa;font-size:15px">합계</span><span style="color:#7dde3c;font-size:22px;font-weight:700">'+fmt(d.total)+'원</span></div>');
  w.document.write('</body></html>');
  w.document.close();setTimeout(function(){w.print();},300);
}

function goTab(t,btn){
  document.querySelectorAll('.pane').forEach(function(p){p.classList.remove('on');});
  document.getElementById('pane-'+t).classList.add('on');
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  if(t==='list')renderList();
}

function renderList(){
  var c=document.getElementById('pane-list');
  if(!docs.length){c.innerHTML='<div class="empty">작성 탭에서 계산서를 만들어주세요</div>';return;}
  var s=docs.slice().sort(function(a,b){return b.date.localeCompare(a.date);});
  var h='';
  s.forEach(function(d){
    var pt=d.date.split('-');
    h+='<div style="margin-bottom:12px">';
    h+='<div class="mhd"><span class="mhd-l">'+pt[0]+'년 '+pt[1]+'월 '+pt[2]+'일'+(d.biz?' · '+d.biz:'')+'</span><span class="mhd-r">'+fmt(d.total)+'원</span></div>';
    h+='<div class="sc">';
    d.items.forEach(function(item){
      h+='<div class="list-item"><span class="li-l">'+item.nm+'</span><span class="li-r">'+fmt(item.amt)+'원</span></div>';
    });
    h+='<div style="background:#fafaf8;padding:12px 16px;display:flex;justify-content:space-between;border-top:2px solid #e8e8e4">';
    h+='<span style="font-size:14px;font-weight:700">합계</span>';
    h+='<span style="font-size:18px;font-weight:700;color:#1a1a1a">'+fmt(d.total)+'원</span></div>';
    h+='</div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">';
    h+='<button onclick="editDoc('+d.id+')" style="padding:10px;border:1px solid #e0e0dc;border-radius:9px;background:#fff;color:#555;font-size:13px;font-weight:600;cursor:pointer">✏️ 수정</button>';
    h+='<button onclick="printDoc('+d.id+')" style="padding:10px;border:1px solid #e0e0dc;border-radius:9px;background:#fff;color:#555;font-size:13px;font-weight:600;cursor:pointer">🖨️ 출력</button>';
    h+='<button onclick="delDoc('+d.id+')" style="padding:10px;border:1px solid #e0e0dc;border-radius:9px;background:#fff;color:#c05a00;font-size:13px;font-weight:600;cursor:pointer">🗑️ 삭제</button>';
    h+='</div></div>';
  });
  // 전체합계
  var tot=docs.reduce(function(s,d){return s+d.total;},0);
  h+='<div style="background:#1a1a1a;border-radius:12px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;margin-top:4px"><span style="color:#aaa;font-size:14px">전체 합계</span><span style="color:#7dde3c;font-size:22px;font-weight:700">'+fmt(tot)+'원</span></div>';
  c.innerHTML=h;
}

// 품목 금액 입력 시 실시간 합계
document.addEventListener('input',function(e){if(e.target.classList.contains('amt'))updateTotal();});
load();
</script>
</body>
</html>
